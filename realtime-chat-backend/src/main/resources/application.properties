spring.application.name=realtime-chat

# Database configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/chatdb}
spring.datasource.username=${DATABASE_USERNAME:chatuser}
spring.datasource.password=${DATABASE_PASSWORD:chatpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis configuration
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Server configuration
server.port=${PORT:8080}
